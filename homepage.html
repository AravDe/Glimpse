<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="pinterest-gallery"></div>

    <header>
        <h1 id="greeting">Welcome Back, <span id="user-name">Name</span></h1>
        <button id="collections-btn" class="header-btn">
            <i class="fa-solid fa-images"></i> Collections
        </button>
    </header>

    <div id="datetime-container">
        <div id="time"></div>
        <div id="date"></div>
    </div>

    <!-- Container for Top Sites -->
    <div id="top-sites-container"></div>

    <main class="container">
        <!-- This new section will contain the file manager -->
        <section id="file-manager-section" class="js-file-manager-root">
            <!-- The file manager will be built here by script.js -->
        </section>

    <script src="script.js"></script>
